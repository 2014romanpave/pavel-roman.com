    <style>
      body { background-color: #000; margin: 0; overflow-x: hidden; }
      #root:empty ~ .archive-loader,
      #root:not(:empty) + .archive-loader {
        display: none;
      }
      .archive-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: #000; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 999999;
      }
      .spinning-logo {
        width: 64px; height: 64px;
        background-color: #fff;
        border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        animation: logo-spin 8s linear infinite;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
      }
      .spinning-logo svg {
        width: 115%; height: 115%;
      }
      .scanline {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, transparent 50%, rgba(255, 255, 255, 0.015) 50%);
        background-size: 100% 4px; pointer-events: none; z-index: 10;
      }
      .loader-fallback {
        margin-top: 20px;
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 10px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        opacity: 0.5;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes logo-spin { 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }
    </style>
  </head>
